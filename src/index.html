<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tombala Game</title>
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <header>
      <ul>
        <li>
          <img src="../assets/logo.svg" alt="" width="80px" height="80px" />
        </li>
        <li></li>
        <li><h1>Tombala</h1></li>
      </ul>
    </header>
    <main id="main" class="main">
      <div id="button-container">
        <button id="start-button" class="start">Başla</button>
        <button id="end-button" class="end" style="display: none">Bitir</button>
        <button id="pause-button" class="pause">Duraklat</button>
      </div>
      <p class="pauseAlert">OYUN DURAKLATILDI</p>
      <p class="finishAlert">OYUN BITTI</p>
      <div id="game-container"></div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
