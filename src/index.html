<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tombala Game</title>
    <link rel="stylesheet" href="./style/style.css" />
    <script
      src="https://kit.fontawesome.com/fc12712811.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <ul>
        <li class="logo">
          <img src="../assets/logo.png" alt="" width="120px" height="80px" />
        </li>
        <div class="header-right">
          <li class="header-right-item"><a href="">Tombala</a></li>
          <li class="header-right-item">
            <a href="#">Çok Yakında</a>
          </li>
          <li class="header-right-item"><a href="./com.html">İletişim</a></li>
          <li id="menu-icon">
            <i class="fa-solid fa-bars"></i>
          </li>
        </div>
      </ul>
    </header>
    <main id="main" class="main">
      <div id="button-container">
        <button id="start-button" class="start">Başla</button>
        <button id="end-button" class="end" style="display: none">Bitir</button>
        <button id="pause-button" class="pause">Duraklat</button>
      </div>
      <p class="pauseAlert">OYUN DURAKLATILDI</p>
      <p class="finishAlert">OYUN BITTI</p>
      <div id="game-container"></div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
